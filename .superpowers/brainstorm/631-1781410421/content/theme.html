<h2>游戏主题 / 世界观</h2>
<p class="subtitle">这个世界你想要什么感觉？选一个最接近你心目中的方向。</p>

<div class="cards">

  <div class="card" data-choice="dark-fantasy" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 40%, #0d0d1a 100%); display:flex; align-items:center; justify-content:center; min-height:140px; font-size:48px;">🧛</div>
    <div class="card-body">
      <h3>黑暗奇幻</h3>
      <p>吸血鬼、亡灵、符文魔法。哥特风格的城堡与墓地，跟 VS 原作最接近的美学方向。</p>
    </div>
  </div>

  <div class="card" data-choice="eastern-fantasy" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0a1a0a 0%, #1a3a1a 40%, #2a1a00 100%); display:flex; align-items:center; justify-content:center; min-height:140px; font-size:48px;">⚔️</div>
    <div class="card-body">
      <h3>东方武侠 / 仙侠</h3>
      <p>修仙、炼丹、剑气纵横。妖魔鬼怪、门派秘境，具有中国文化特色的幸存者。</p>
    </div>
  </div>

  <div class="card" data-choice="scifi" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #000a1a 0%, #001a3a 40%, #0a002a 100%); display:flex; align-items:center; justify-content:center; min-height:140px; font-size:48px;">🤖</div>
    <div class="card-body">
      <h3>科幻 / 赛博朋克</h3>
      <p>机器人大军、激光武器、霓虹城市。用科技感替换魔法感，打出差异化。</p>
    </div>
  </div>

  <div class="card" data-choice="undecided" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%); display:flex; align-items:center; justify-content:center; min-height:140px; font-size:48px;">🎯</div>
    <div class="card-body">
      <h3>先不定主题</h3>
      <p>用 placeholder 美术先把玩法做通，主题等核心循环稳定后再定。</p>
    </div>
  </div>

</div>
